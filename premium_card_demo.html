<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 카드 디자인 데모</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .battle-card {
            position: relative;
            background: linear-gradient(135deg, #2d3142 0%, #1a1a2e 100%);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            border: 2px solid;
            overflow: hidden;
        }

        .battle-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }

        .battle-card.common {
            border-color: #9e9e9e;
        }

        .battle-card.rare {
            border-color: #4a90e2;
            box-shadow: 0 10px 30px rgba(74, 144, 226, 0.3);
        }

        .battle-card.epic {
            border-color: #9d4edd;
            box-shadow: 0 10px 30px rgba(157, 78, 221, 0.4);
        }

        .battle-card.legendary {
            border-color: #ffd700;
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.5);
            animation: legendary-glow 2s ease-in-out infinite;
        }

        @keyframes legendary-glow {
            0%, 100% {
                box-shadow: 0 15px 40px rgba(255, 215, 0, 0.5);
            }
            50% {
                box-shadow: 0 15px 50px rgba(255, 215, 0, 0.8), 0 0 30px rgba(255, 215, 0, 0.4);
            }
        }

        .battle-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, currentColor, transparent);
            opacity: 0.5;
        }

        .card-illustration {
            width: 100%;
            height: 160px;
            margin-bottom: 10px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 10px;
            padding: 10px;
        }

        .card-header {
            text-align: center;
            margin-bottom: 10px;
        }

        .card-name {
            font-size: 1.1em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .card-rarity {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .card-stats {
            display: flex;
            justify-content: space-around;
            margin: 10px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.7em;
            opacity: 0.7;
            margin-bottom: 3px;
        }

        .stat-value {
            font-size: 1.2em;
            font-weight: 700;
        }

        .stat-value.hp {
            color: #06d6a0;
        }

        .stat-value.atk {
            color: #ff6b35;
        }

        .card-special {
            font-size: 0.8em;
            text-align: center;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            border-left: 3px solid currentColor;
            opacity: 0.9;
        }

        .legendary .card-illustration {
            position: relative;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>

        <h1>⚔️ 프리미엄 카드 컬렉션 ⚔️</h1>
        <div class="cards-grid" id="cardsContainer"></div>
    </div>

    <script>

            { id: 'ninja', name: '닌자', hp: 7, atk: 6, rarity: 'legendary', special: '대상에게 12 피해', color: '#ffd700' },

        function getCardIllustration(cardId) {

                'knight': `

                'mage': `
                    <svg viewBox="0 0 200 200" style="width:100%;height:100%">
                        <defs>
                            <linearGradient id="mage-grad" x1="0%" y1="0%" x2="0%" y2="100%">

                'dragon': `

            };
            
            return illustrations[cardId] || illustrations['assault'];
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            
            cardData.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = `battle-card ${card.rarity}`;
                cardEl.style.color = card.color;
                
                cardEl.innerHTML = `
                    <div class="card-illustration">
                        ${getCardIllustration(card.id)}
                    </div>
                    <div class="card-header">
                        <div class="card-name" style="color: ${card.color}">${card.name}</div>
                        <div class="card-rarity">${card.rarity}</div>
                    </div>
                    <div class="card-stats">
                        <div class="stat">
                            <div class="stat-label">HP</div>
                            <div class="stat-value hp">${card.hp}</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">ATK</div>
                            <div class="stat-value atk">${card.atk}</div>
                        </div>
                    </div>
                    <div class="card-special" style="border-color: ${card.color}">
                        ✨ ${card.special}
                    </div>
                `;
                
                container.appendChild(cardEl);
            });
        }

        renderCards();
    </script>
</body>
</html>
